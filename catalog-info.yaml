# ─── API ──────────────────────────────────────────────────────────────────────
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: payments-rest-api
  title: Payments REST API
  description: >
    REST API for payment initiation, status queries and refunds.
    Protected by OAuth2. Rate limited to 1000 req/min per client.
  annotations:
    bank.com/sysid: SYSID-00000
    github.com/project-slug: bank-org/payments-service
  tags:
    - rest
    - openapi
    - payments
    - oauth2
    - sysid-00000
  links:
    - url: https://api-docs.bank.com/payments
      title: API Docs
      icon: docs
    - url: https://postman.bank.com/payments-api
      title: Postman Collection
      icon: scaffolder
spec:
  type: openapi
  lifecycle: production
  owner: group:default/team-payments
  system: payments-platform
  definition: |
    openapi: "3.0.0"
    info:
      title: Payments API
      version: "2.1.0"
      description: REST API for payment initiation and management
    servers:
      - url: https://api.bank.com/payments
    security:
      - oauth2: [payments.write, payments.read]
    paths:
      /v2/payments:
        post:
          operationId: initiatePayment
          summary: Initiate a payment
          tags: [Payments]
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required: [amount, currency, destinationAccount]
                  properties:
                    amount:
                      type: number
                      example: 1500.00
                    currency:
                      type: string
                      example: USD
                    destinationAccount:
                      type: string
                      example: "ACC-000123"
                    reference:
                      type: string
          responses:
            '202':
              description: Payment accepted for processing
            '400':
              description: Invalid request
            '422':
              description: Business rule violation
      /v2/payments/{id}:
        get:
          operationId: getPaymentStatus
          summary: Get payment status
          tags: [Payments]
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Payment details
            '404':
              description: Payment not found
      /v2/payments/{id}/refund:
        post:
          operationId: refundPayment
          summary: Refund a payment
          tags: [Payments]
          responses:
            '202':
              description: Refund initiated

---

# ─── API — FTP Outbound (producer / AsyncAPI) ────────────────────────────────
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: payments-ftp-outbound
  title: Payments FTP Outbound
  description: >
    Async file exchange — files produced by payments-service and deposited on
    the FTP server for downstream processor collection. Covers settlement
    reports, reconciliation files and payment confirmation batches.
  annotations:
    bank.com/sysid: SYSID-00000
    github.com/project-slug: bank-org/payments-service
  tags:
    - ftp
    - asyncapi
    - file-transfer
    - producer
    - sysid-00000
spec:
  type: asyncapi
  lifecycle: production
  owner: group:default/team-payments
  system: payments-platform
  definition: |
    asyncapi: "2.6.0"
    info:
      title: Payments FTP Outbound
      version: "1.0.0"
      description: >
        Async file exchange produced by payments-service. Files are deposited
        on the FTP server on a scheduled basis for downstream processors.
    servers:
      production:
        url: ftp.bank.com
        protocol: ftp
        description: Production FTP server
    channels:
      /outbound/settlement/{date}:
        description: Daily settlement report — one file per business day
        parameters:
          date:
            description: Business date in YYYYMMDD format
            schema:
              type: string
              example: "20260420"
        publish:
          summary: Deposit settlement report
          message:
            name: SettlementReport
            contentType: text/csv
            payload:
              type: object
              description: Fixed-width CSV. Columns — txn_id, amount, currency, status, settled_at

---

# ─── API — FTP Inbound (consumer / AsyncAPI) ─────────────────────────────────
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: payments-ftp-inbound
  title: Payments FTP Inbound
  description: >
    Async file exchange — files deposited on the FTP server by third-party
    processors and consumed by payments-service. Covers incoming payment
    instruction files and processor acknowledgement files.
  annotations:
    bank.com/sysid: SYSID-00000
    github.com/project-slug: bank-org/payments-service
  tags:
    - ftp
    - asyncapi
    - file-transfer
    - consumer
    - sysid-00000
spec:
  type: asyncapi
  lifecycle: production
  owner: group:default/team-payments
  system: payments-platform
  definition: |
    asyncapi: "2.6.0"
    info:
      title: Payments FTP Inbound
      version: "1.0.0"
      description: >
        Async file exchange consumed by payments-service. Files are deposited
        by third-party processors and polled by payments-service for ingestion.
    servers:
      production:
        url: ftp.bank.com
        protocol: ftp
        description: Production FTP server
    channels:
      /inbound/instructions/{date}:
        description: Incoming bulk payment instruction files from processors
        parameters:
          date:
            description: Business date in YYYYMMDD format
            schema:
              type: string
              example: "20260420"
        subscribe:
          summary: Consume incoming payment instructions
          message:
            name: PaymentInstructionFile
            contentType: application/xml
            payload:
              type: object
              description: ISO 20022 pain.001 payment initiation message

---

# ─── API — Kafka Producer (AsyncAPI) ─────────────────────────────────────────
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: payments-kafka-producer
  title: Payments Kafka Producer
  description: >
    Async event stream produced by payments-service. Publishes payment lifecycle
    events to Kafka topics for consumption by downstream services such as
    notifications, reporting and audit.
  annotations:
    bank.com/sysid: SYSID-00000
    github.com/project-slug: bank-org/payments-service
  tags:
    - kafka
    - asyncapi
    - events
    - producer
    - sysid-00000
spec:
  type: asyncapi
  lifecycle: production
  owner: group:default/team-payments
  system: payments-platform
  definition: |
    asyncapi: "2.6.0"
    info:
      title: Payments Kafka Producer
      version: "1.0.0"
      description: >
        Payment lifecycle events published by payments-service to Kafka.
        Consumers include notification-service, audit-service and reporting-service.
    servers:
      production:
        url: kafka.bank.com:9092
        protocol: kafka
        description: Production Kafka cluster
        security:
          - saslScram: []
    channels:
      payments.events.payment-completed:
        description: Published when a payment is successfully processed and settled
        publish:
          summary: Payment completed event
          bindings:
            kafka:
              topic: payments.events.payment-completed
              partitions: 12
              replicas: 3
          message:
            name: PaymentCompleted
            contentType: application/json
            payload:
              type: object
              required: [eventId, txnId, amount, currency, completedAt]
              properties:
                eventId:
                  type: string
                txnId:
                  type: string
                amount:
                  type: number
                currency:
                  type: string
                  example: USD
                completedAt:
                  type: string
                  format: date-time
    components:
      securitySchemes:
        saslScram:
          type: scramSha256
          description: SASL/SCRAM-SHA-256 authentication

---

# ─── API — Kafka Consumer (AsyncAPI) ─────────────────────────────────────────
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: payments-kafka-consumer
  title: Payments Kafka Consumer
  description: >
    Async event stream consumed by payments-service. Subscribes to fraud
    decisions from fraud-detection-service and ledger confirmations from
    ledger-service to complete payment processing.
  annotations:
    bank.com/sysid: SYSID-00000
    github.com/project-slug: bank-org/payments-service
  tags:
    - kafka
    - asyncapi
    - events
    - consumer
    - sysid-00000
spec:
  type: asyncapi
  lifecycle: production
  owner: group:default/team-payments
  system: payments-platform
  definition: |
    asyncapi: "2.6.0"
    info:
      title: Payments Kafka Consumer
      version: "1.0.0"
      description: >
        Kafka topics consumed by payments-service. Fraud decisions and ledger
        confirmations are consumed to drive payment state transitions.
    servers:
      production:
        url: kafka.bank.com:9092
        protocol: kafka
        description: Production Kafka cluster
        security:
          - saslScram: []
    channels:
      fraud.events.fraud-decision:
        description: Fraud decision events published by fraud-detection-service
        subscribe:
          summary: Consume fraud decision
          bindings:
            kafka:
              topic: fraud.events.fraud-decision
              groupId: payments-service-fraud-consumer
          message:
            name: FraudDecision
            contentType: application/json
            payload:
              type: object
              required: [txnId, decision, score, decidedAt]
              properties:
                txnId:
                  type: string
                decision:
                  type: string
                  enum: [APPROVE, BLOCK, REVIEW]
                score:
                  type: number
                decidedAt:
                  type: string
                  format: date-time
    components:
      securitySchemes:
        saslScram:
          type: scramSha256
          description: SASL/SCRAM-SHA-256 authentication

