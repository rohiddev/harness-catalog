# ─── Component — Microservice ────────────────────────────────────────────────
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: payments-service
  title: Payments Service
  description: >
    Processes payment transactions, validates against fraud rules,
    posts to the ledger and publishes lifecycle events to RabbitMQ.
  annotations:
    # Source control
    github.com/project-slug: bank-org/payments-service
    # TechDocs
    backstage.io/techdocs-ref: dir:.
    # Harness CI/CD
    harness.io/project-id: SYSID-00000
    # Kubernetes
    backstage.io/kubernetes-id: payments-service
    backstage.io/kubernetes-namespace: payments-p
    # Observability — native plugin annotation keys
    pagerduty.com/service-id: PABC123
    grafana/dashboard-url: https://grafana.bank.com/d/payments-service
    datadoghq.com/dashboard-url: https://app.datadoghq.com/dashboard/payments
    # Tracking
    jira/project-key: PAY
    # CMDB correlation
    bank.com/sysid: SYSID-00000
  tags:
    - java
    - spring-boot
    - payments
    - tier-1
    - sysid-00000
  links:
    - url: https://runbooks.bank.com/payments-service
      title: Runbook
      icon: book
    - url: https://grafana.bank.com/d/payments-service
      title: Grafana
      icon: dashboard
    - url: https://app.datadoghq.com/dashboard/payments
      title: Datadog
      icon: dashboard
    - url: https://sonar.bank.com/project?id=payments-service
      title: SonarQube
      icon: quality
    - url: https://confluence.bank.com/display/PAY/payments-service
      title: Confluence
      icon: docs
    - url: https://oncall.bank.com/payments
      title: On-Call Schedule
      icon: group
spec:
  type: service
  lifecycle: production
  owner: group:default/team-payments
  system: payments-platform
  providesApis:
    - payments-rest-api
    - payments-ftp-outbound          # produces files to FTP (e.g. settlement reports)
  consumesApis:
    - auth-api
    - fraud-detection-api
    - ledger-api
    - payments-ftp-inbound           # consumes files from FTP (e.g. incoming payment files)
  dependsOn:
    - resource:default/payments-postgres
    - resource:default/payments-rabbitmq
    - resource:default/payments-redis
    - resource:default/payments-ftp

