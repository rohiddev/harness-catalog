    grafana/dashboard-url: https://grafana.bank.com/d/payments-service
    datadoghq.com/dashboard-url: https://app.datadoghq.com/dashboard/payments
    # Tracking
    jira/project-key: PAY
    # CMDB correlation
    bank.com/sysid: SYSID-06435
  tags:
    - java
    - spring-boot
    - payments
    - tier-1
  links:
    - url: https://runbooks.bank.com/payments-service
      title: Runbook
      icon: book
    - url: https://grafana.bank.com/d/payments-service
      title: Grafana
      icon: dashboard
    - url: https://app.datadoghq.com/dashboard/payments
      title: Datadog
      icon: dashboard
    - url: https://sonar.bank.com/project?id=payments-service
      title: SonarQube
      icon: quality
    - url: https://confluence.bank.com/display/PAY/payments-service
      title: Confluence
      icon: docs
    - url: https://oncall.bank.com/payments
      title: On-Call Schedule
      icon: group
spec:
  type: service
  lifecycle: production
  owner: group:default/team-payments
  system: payments-platform
  providesApis:
