  description: >
    End-to-end payments processing platform covering payment initiation,
    fraud detection, ledger posting and event publishing.
  annotations:
    bank.com/sysid: SYSID-00000
    jira/project-key: PAY
  tags:
    - payments
    - core-banking
    - tier-1
    - sysid-00000
  links:
