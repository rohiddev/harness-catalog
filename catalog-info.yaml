# =============================================================================
# API — Kafka Producer (AsyncAPI)
# payments-service publishes payment lifecycle events → Kafka
# =============================================================================
apiVersion: harness.io/v1
kind: API
identifier: payments_kafka_producer
name: payments-kafka-producer
type: asyncapi
owner: group:account/team-payments
metadata:
  title: Payments Kafka Producer
  description: >
    Async event stream produced by payments-service. Publishes payment lifecycle
    events to Kafka topics for consumption by downstream services such as
    notifications, reporting and audit.
  annotations:
    bank.com/sysid: SYSID-00000
    github.com/project-slug: bank-org/payments-service
  tags:
    - kafka
    - asyncapi
    - events
    - producer
    - sysid-00000
spec:
  lifecycle: production
  system:
    - system:account/payments_platform
  definition: |
    asyncapi: "2.6.0"
    info:
      title: Payments Kafka Producer
      version: "1.0.0"
      description: >
        Payment lifecycle events published by payments-service to Kafka.
        Consumers include notification-service, audit-service and reporting-service.
    servers:
      production:
        url: kafka.bank.com:9092
        protocol: kafka
        description: Production Kafka cluster
        security:
          - saslScram: []
    channels:
      payments.events.payment-completed:
        description: Published when a payment is successfully processed and settled
        publish:
          summary: Payment completed event
          bindings:
            kafka:
              topic: payments.events.payment-completed
              partitions: 12
              replicas: 3
          message:
            name: PaymentCompleted
            contentType: application/json
            payload:
              type: object
              required: [eventId, txnId, amount, currency, completedAt]
              properties:
                eventId:
                  type: string
                txnId:
                  type: string
                amount:
                  type: number
                currency:
                  type: string
                  example: USD
                completedAt:
                  type: string
                  format: date-time
    components:
      securitySchemes:
        saslScram:
          type: scramSha256
          description: SASL/SCRAM-SHA-256 authentication

---

# =============================================================================
# API — Kafka Consumer (AsyncAPI)
# payments-service subscribes to fraud decisions and ledger confirmations
# =============================================================================
apiVersion: harness.io/v1
kind: API
identifier: payments_kafka_consumer
name: payments-kafka-consumer
type: asyncapi
owner: group:account/team-payments
metadata:
  title: Payments Kafka Consumer
  description: >
    Async event stream consumed by payments-service. Subscribes to fraud
    decisions from fraud-detection-service and ledger confirmations from
    ledger-service to complete payment processing.
  annotations:
    bank.com/sysid: SYSID-00000
    github.com/project-slug: bank-org/payments-service
  tags:
    - kafka
    - asyncapi
    - events
    - consumer
    - sysid-00000
spec:
  lifecycle: production
  system:
    - system:account/payments_platform
  definition: |
    asyncapi: "2.6.0"
    info:
      title: Payments Kafka Consumer
      version: "1.0.0"
      description: >
        Kafka topics consumed by payments-service. Fraud decisions and ledger
        confirmations are consumed to drive payment state transitions.
    servers:
      production:
        url: kafka.bank.com:9092
        protocol: kafka
        description: Production Kafka cluster
        security:
          - saslScram: []
    channels:
      fraud.events.fraud-decision:
        description: Fraud decision events published by fraud-detection-service
        subscribe:
          summary: Consume fraud decision
          bindings:
            kafka:
              topic: fraud.events.fraud-decision
              groupId: payments-service-fraud-consumer
          message:
            name: FraudDecision
            contentType: application/json
            payload:
              type: object
              required: [txnId, decision, score, decidedAt]
              properties:
                txnId:
                  type: string
                decision:
                  type: string
                  enum: [APPROVE, BLOCK, REVIEW]
                score:
                  type: number
                decidedAt:
                  type: string
                  format: date-time
    components:
      securitySchemes:
        saslScram:
          type: scramSha256
          description: SASL/SCRAM-SHA-256 authentication
