page:
  name: EntityLayout
  tabs:

    - name: Overview
      path: /
      title: Overview
      contents:
        - component: EntityOrphanWarning
        - component: EntityRelationWarning
        - component: EntityProcessingErrorsPanel

        - component: EntityAboutCard
          specs:
            props:
              variant: gridItem
            gridProps:
              md: 6

        - component: EntityLinksCard
          specs:
            props:
              variant: gridItem
              height: 400
            gridProps:
              md: 6

        - component: EntityCatalogGraphCard
          specs:
            props:
              variant: gridItem
              height: 400
            gridProps:
              md: 12
              xs: 12

    - name: Components
      path: /components
      title: Components
      contents:
        - component: EntityHasComponentsCard
          specs:
            props:
              variant: gridItem
            gridProps:
              md: 12

    - name: APIs
      path: /apis
      title: APIs
      contents:
        - component: EntityHasApisCard
          specs:
            props:
              variant: gridItem
            gridProps:
              md: 12

    - name: Resources
      path: /resources
      title: Resources
      contents:
        - component: EntityHasResourcesCard
          specs:
            props:
              variant: gridItem
            gridProps:
              md: 12

    - name: TechDocs
      path: /docs
      title: Docs
      contents:
        - component: EntityTechdocsContent
