# ═══════════════════════════════════════════════════════════════════════════════
# now.yaml — Golden Template  v2.0
# Owner: Platform Engineering | Last updated: 2026-04-20
#
# HOW TO USE
#   1. Copy this file → save as now.yaml in your repo root
#   2. Fill sysId, name, projectName
#   3. Under each section, list only what applies — remove sections you don't use
#   4. Push to master — RapDev fires automatically, ServiceNow updated within 60s
#
# RULES
#   - Declare what WE depend on — not who depends on us
#   - 1 hop only — direct dependencies only
#   - sysId must match bank.com/sysid in catalog-info.yaml
#
# REFERENCE EXAMPLE  →  now.yaml (payments-service)
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: csdm/v1
kind: BusinessService

metadata:
  sysId: <SYSID-NNNNN>             # REQUIRED  e.g. SYSID-00000
  name: <service-name>             # REQUIRED  e.g. payments-service
  projectName: <Project Name>      # REQUIRED  e.g. Payments Service

dependencies:

  # ── APIs — services this service calls over REST/SOAP ────────────────────────
  # Remove this section if this service makes no outbound API calls.

  apis:
    - target: <service-name>       # REQUIRED  name of the service being called
      description: "<why>"         # OPTIONAL  e.g. "OAuth2 token validation"

  # ── Databases ────────────────────────────────────────────────────────────────
  # Remove this section if this service has no direct database connections.

  databases:
    - target: <db-name>            # REQUIRED  e.g. payments-postgres
      engine: <engine>             # OPTIONAL  postgresql | mysql | oracle | mssql | redis | mongodb
      description: "<what it stores>"

  # ── Kafka ────────────────────────────────────────────────────────────────────
  # Remove produces or consumes if not applicable.
  # Remove this section if this service does not use Kafka.

  kafka:
    - target: <kafka-cluster-name> # REQUIRED  e.g. payments-kafka
      produces:                    # OPTIONAL  topics this service publishes to
        - <topic-name>
      consumes:                    # OPTIONAL  topics this service subscribes to
        - <topic-name>
      description: "<what events>"

  # ── Message Queue (IBM MQ / RabbitMQ) ────────────────────────────────────────
  # Remove this section if this service does not use a traditional MQ broker.

  mq:
    - target: <mq-broker-name>     # REQUIRED  e.g. payments-ibmmq
      sends:                       # OPTIONAL  queues this service puts messages on
        - <queue-name>
      receives:                    # OPTIONAL  queues this service reads from
        - <queue-name>
      description: "<what messages>"

  # ── FTP / SFTP ───────────────────────────────────────────────────────────────
  # Remove outbound or inbound if not applicable.
  # Remove this section if this service does not use FTP file exchange.

  ftp:
    - target: <ftp-server-name>    # REQUIRED  e.g. payments-ftp
      outbound: <path>             # OPTIONAL  path where this service deposits files
      inbound: <path>              # OPTIONAL  path where this service collects files
      description: "<what files>"
