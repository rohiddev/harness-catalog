apiVersion: harness.io/v1
kind: API
identifier: payments_ftp_inbound
metadata:
  name: payments-ftp-inbound
  title: Payments FTP Inbound
  description: >
    Async file exchange - files deposited on the FTP server by third-party
    processors and consumed by payments-service. Covers incoming payment
    instruction files and processor acknowledgement files.
  annotations:
    bank.com/sysid: SYSID-00000
    github.com/project-slug: bank-org/payments-service
  tags:
    - ftp
    - asyncapi
    - file-transfer
    - consumer
    - sysid-00000
spec:
  type: asyncapi
  lifecycle: production
  owner: group:default/team-payments
  system: payments-platform
  definition: |
    asyncapi: "2.6.0"
    info:
      title: Payments FTP Inbound
      version: "1.0.0"
      description: >
        Async file exchange consumed by payments-service. Files are deposited
        by third-party processors and polled by payments-service for ingestion.
    servers:
      production:
        url: ftp.bank.com
        protocol: ftp
        description: Production FTP server
    channels:
      /inbound/instructions/{date}:
        description: Incoming bulk payment instruction files from processors
        parameters:
          date:
            description: Business date in YYYYMMDD format
            schema:
              type: string
              example: "20260420"
        subscribe:
          summary: Consume incoming payment instructions
          message:
            name: PaymentInstructionFile
            contentType: application/xml
            payload:
              type: object
              description: ISO 20022 pain.001 payment initiation message
