apiVersion: harness.io/v1
kind: API
identifier: payments_mq_consumer
name: payments-mq-consumer
type: asyncapi
owner: group:account/team-payments
metadata:
  title: Payments MQ Consumer
  description: >
    Messages consumed by payments-service from the enterprise IBM MQ broker.
    Receives payment acknowledgements and processor responses from downstream
    processor queues using IBM MQ over AMQP.
  annotations:
    bank.com/sysid: SYSID-00000
    github.com/project-slug: bank-org/payments-service
  tags:
    - ibm-mq
    - asyncapi
    - amqp
    - consumer
    - sysid-00000
spec:
  lifecycle: production
  system:
    - system:account/payments_platform
  definition: |
    asyncapi: "2.6.0"
    info:
      title: Payments MQ Consumer
      version: "1.0.0"
      description: >
        Payment acknowledgements and processor responses consumed by
        payments-service from the enterprise IBM MQ broker.
    servers:
      production:
        url: mq.bank.com:5672
        protocol: amqp
        description: Production IBM MQ broker
        security:
          - userPassword: []
    channels:
      payments/acknowledgements/inbound:
        description: Payment acknowledgements received from downstream processors
        subscribe:
          summary: Consume payment acknowledgement
          bindings:
            amqp:
              is: queue
              queue:
                name: PAYMENTS.ACKNOWLEDGEMENTS.INBOUND
                durable: true
                exclusive: false
                autoDelete: false
          message:
            name: PaymentAcknowledgement
            contentType: application/json
            payload:
              type: object
              required: [instructionId, status, processedAt]
              properties:
                instructionId:
                  type: string
                status:
                  type: string
                  enum: [ACCEPTED, REJECTED, PENDING]
                rejectionReason:
                  type: string
                processedAt:
                  type: string
                  format: date-time
    components:
      securitySchemes:
        userPassword:
          type: userPassword
          description: IBM MQ user/password authentication
