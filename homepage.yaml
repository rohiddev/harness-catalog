# =============================================================================
# Harness IDP — Homepage Layout
#
# Apply via: Admin > Layout > Homepage > Edit YAML
#
# Logo: Set via Admin > Appearance > Logo (portal-wide, swap URL for prod)
#
# Banner: Update manually when a production freeze is active.
#   Default:  ✅ No active production freezes.
#   Freeze:   🔴 PROD FREEZE ACTIVE — no deployments to production until [date].
#             Contact platform-team@bank.com
# =============================================================================

header:
  title: "<+greeting>, <+first_name>. Welcome to the Bank Developer Portal."
  subtitle: "Your single source of truth for services, APIs, and self-service."
  quickLinks:
    - title: Catalog
      url: /catalog
      icon: catalog
    - title: Self-Service
      url: /create
      icon: scaffolder
    - title: Scorecards
      url: /scorecards
      icon: quality
    - title: TechDocs
      url: /docs
      icon: docs

banner:
  text: "✅ No active production freezes. For platform support contact platform-team@bank.com"

cards:
  # ── Row 1: Platform Status (full width) ─────────────────────────────────────
  # Update links below to point to your internal freeze calendar / ServiceNow board
  - type: custom
    width: 12md
    content: |
      ## Platform Status

      | | Resource | Description |
      |---|---|---|
      | 📅 | [Freeze Calendar](https://confluence.bank.com/display/ENG/freeze-calendar) | Scheduled production freeze windows |
      | 🎫 | [Change Advisory Board](https://servicenow.bank.com/change) | Active and pending change requests |
      | 🚨 | [Incident Dashboard](https://oncall.bank.com/incidents) | Live incidents and P1/P2 status |
      | 📞 | [On-Call Schedule](https://oncall.bank.com) | Who is on-call right now |
      | 🏗 | [Harness Pipelines](https://app.harness.io) | CI/CD pipeline runs |
      | 📊 | [Datadog](https://app.datadoghq.com) | Service health and dashboards |

      > To raise a production freeze update on this banner — contact the Platform Engineering team or update via **Admin > Layout > Homepage**.

  # ── Row 2: Personalised (half + half) ───────────────────────────────────────
  - type: RecentlyVisited
    width: 6md

  - type: TopVisited
    width: 6md

  # ── Row 3: My Workspace (half + half) ───────────────────────────────────────
  - type: StarredEntities
    width: 6md

  - type: custom
    width: 6md
    content: |
      ## What's New

