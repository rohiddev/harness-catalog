      ---
      [Full platform release notes →](https://developer.harness.io/release-notes/internal-developer-portal)

  # ── Row 4: Onboarding (half + half) ─────────────────────────────────────────
  - type: custom
    width: 6md
    content: |
      ## Getting Started

      New to the Developer Portal? Here's your checklist:

      **1. Register your service**
      Add `catalog-info.yaml` to your repo root on `master`, then [import it into the catalog →](/catalog/import)

      **2. Link to CMDB**
      Add `now.yaml` alongside `catalog-info.yaml`. Both must score 100% on the [Production Readiness Scorecard →](/scorecards)

      **3. Enable TechDocs**
      Add `mkdocs.yml` + `docs/index.md` to your repo. Your service gets a **Docs** tab automatically.

      **4. Run your first self-service workflow**
      Browse [Self-Service Workflows →](/create) — onboarding, access, provisioning, and more.

      **5. Star your services**
      Click ⭐ on any catalog entity to pin it to your homepage.

      ---
      Need help? Email [platform-team@bank.com](mailto:platform-team@bank.com)

  - type: custom
    width: 6md
    content: |
      ## IDP 101 — Key Concepts

      | Concept | What it is |
      |---|---|
      | **Software Catalog** | Central registry of all services, APIs, libraries, and resources across the bank |
      | **catalog-info.yaml** | Entity definition file — lives in your repo root on `master` branch |
      | **now.yaml** | CMDB linkage file — declares your service dependencies for ServiceNow |
      | **Workflow** | Self-service form that triggers a Harness pipeline — replaces Jira tickets |
      | **Scorecard** | Automated quality gate — checks catalog completeness, CI/CD hygiene, security |
      | **TechDocs** | Rendered `docs/` folder — your service's living documentation inside IDP |
      | **System** | Group of related services (e.g. Payments Platform = service + DB + Kafka + APIs) |
      | **Starred Entities** | Your bookmarked services — pinned to your homepage for quick access |

      ---
      [Read the full IDP documentation →](https://developer.harness.io/docs/internal-developer-portal)
