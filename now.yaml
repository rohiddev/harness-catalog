# ───────────────────────────────────────────────────────────────────────────────
# now.yaml — CSDM as Code (RapDev)  *** WORKED EXAMPLE ***
#
# Declares this service's identity and all direct (1-hop) dependencies.
# Push to master → RapDev reads this → ServiceNow cmdb_rel_ci updated instantly.
# Production support uses cmdb_rel_ci to find all impacted services during outages.
#
# STARTING YOUR OWN SERVICE? Copy now.template.yaml
# ───────────────────────────────────────────────────────────────────────────────

apiVersion: csdm/v1
kind: BusinessService

metadata:
  sysId: SYSID-00000
  name: payments-service
  projectName: Payments Service

dependencies:

  apis:
    - target: auth-service
      description: "OAuth2 token validation on every inbound request"
    - target: fraud-detection-api
      description: "Real-time fraud scoring per transaction"
    - target: ledger-service
      description: "Ledger posting after payment approval"

  databases:
    - target: payments-postgres
      engine: postgresql
      description: "Primary transactional store"
    - target: payments-redis
      engine: redis
      description: "Session cache and idempotency key store"

  kafka:
    - target: payments-kafka
      produces:
        - payments.events.payment-completed
      consumes:
        - fraud.events.fraud-decision
        - ledger.events.ledger-confirmation
      description: "Payment lifecycle events, fraud decisions, ledger confirmations"

  mq:
    - target: payments-ibmmq
      broker: IBM MQ
      sends:
        - PAYMENTS.INSTRUCTIONS.OUTBOUND
      receives:
        - PAYMENTS.ACKNOWLEDGEMENTS.INBOUND
      description: "Payment instructions out, processor acknowledgements in"

  ftp:
    - target: payments-ftp
      outbound: /outbound/settlement
      inbound: /inbound/instructions
      description: "Settlement reports out, payment instruction files in"
