# =============================================================================
# catalog-info-example.yaml
#
# Full reference example showing all supported entity kinds and fields.
# This file is for documentation only — do not import it as-is.
# Each entity must be imported individually via "Create Component > Import from Git".
#
# Entity hierarchy:
#   System  (the platform / product group)
#     ├── Component  (a microservice — one per repo)
#     ├── Resource   (database, cache, queue, FTP server, etc.)
#     └── API        (REST, AsyncAPI — producer and consumer)
#
# Entity reference format at ACCOUNT scope:
#   system:account/<identifier>
#   resource:account/<identifier>
#   group:account/<team-identifier>
#
# In practice:
#   - System + Resources live in a central catalog repo (managed by platform team)
#   - Component lives in each service repo (generated by create-repo workflow)
#   - APIs live in the service repo alongside the Component
# =============================================================================

# =============================================================================
# SYSTEM
# A System groups related components, APIs and resources into a logical product.
# Typically maps 1:1 to a SYSID in ServiceNow CMDB.
# Managed centrally — not per-repo.
# =============================================================================
apiVersion: harness.io/v1
kind: System

# identifier: used in all entity references — snake_case, no spaces
identifier: your_platform_name

# name: display name in the catalog — kebab-case
name: your-platform-name

# type: must be "system" for System entities
type: system

# owner: scoped group reference — group:account/<team-identifier>
owner: group:account/your-platform-team

metadata:
  title: Your Platform Name

  description: >
    Brief description of what this platform does and what business capability
    it delivers. One or two sentences.

  annotations:
    # CMDB — links to the ServiceNow business service record
    bank.com/sysid: SYSID-XXXXX
    # Jira — the Jira project for this platform
    jira/project-key: YOURKEY

  tags:
    - payments          # domain
    - core-banking      # sub-domain
    - tier-1            # criticality
    - sysid-xxxxx       # always include for filtering

  links:
    - url: https://confluence.bank.com/display/YOUR
      title: Confluence Space
      icon: docs
    - url: https://confluence.bank.com/display/YOUR/architecture
      title: Architecture Diagram
      icon: scaffolder
    - url: https://runbooks.bank.com/your-platform
      title: Platform Runbook
      icon: book
    - url: https://jira.bank.com/projects/YOURKEY
      title: Jira Project
      icon: bug

spec:
  domain: banking

---

# =============================================================================
# COMPONENT
# A Component represents a single deployable unit — one microservice, one repo.
# This is what lives in each service repo's catalog-info.yaml.
# Generated by the create-repo workflow and auto-discovered by IDP.
# =============================================================================
apiVersion: harness.io/v1
kind: Component

identifier: your_service_name
name: your-service-name
type: service
owner: group:account/your-team-name

metadata:
  title: Your Service Name

  description: >
    Brief description of what this service does, who it serves,
    and its role in the broader platform.

  annotations:

    # -- Source control --
    # Drives the Code tab and repo link in IDP
    github.com/project-slug: bank-org/your-service-name
    backstage.io/source-location: url:https://github.com/bank-org/your-service-name

    # -- TechDocs --
    # Enables the Docs tab. dir:. means docs/ folder lives in this repo.
    backstage.io/techdocs-ref: dir:.

    # -- Harness CI/CD --
    # Drives the CI/CD tab. project-url links to the Harness project.
    # pipelines: comma-separated pipeline IDs (omit to show all pipelines)
    harness.io/project-url: https://app.harness.io/ng/account/<account-id>/module/ci/orgs/default/projects/<SYSID>/pipelines
    harness.io/pipelines: your-service-deploy,your-service-ci

    # -- Harness SEI --
    # DORA metrics: deployment frequency, lead time, MTTR, change failure rate
    harness.io/sei-project-id: SYSID-XXXXX

    # -- Kubernetes --
    # Drives the Kubernetes tab showing pods, deployments, and health
    backstage.io/kubernetes-id: your-service-name
    backstage.io/kubernetes-namespace: your-namespace

    # -- PagerDuty --
    # Drives the PagerDuty card on Overview (on-call, incidents)
    pagerduty.com/service-id: PXXXXXXX

    # -- Datadog --
    # Drives the Datadog tab with dashboards and metrics
    datadoghq.com/dashboard-url: https://app.datadoghq.com/dashboard/your-dashboard

    # -- SonarQube --
    # Drives the SonarQube card on Overview (code quality, coverage)
    sonarqube.org/project-key: your-service-name

    # -- Jira --
    jira/project-key: YOURKEY

    # -- CMDB --
    bank.com/sysid: SYSID-XXXXX

  tags:
    - java              # primary language
    - spring-boot       # framework
    - payments          # domain
    - tier-1            # criticality tier
    - sysid-xxxxx       # always include for catalog filtering

  # Links appear in the Links card on the Overview tab
  # icon values: docs, dashboard, book, bug, group, scaffolder, quality, help
  links:
    - url: https://runbooks.bank.com/your-service
      title: Runbook
      icon: book
    - url: https://app.datadoghq.com/dashboard/your-dashboard
      title: Datadog
      icon: dashboard
    - url: https://sonar.bank.com/project?id=your-service-name
      title: SonarQube
      icon: quality
    - url: https://confluence.bank.com/display/YOUR/your-service
      title: Confluence
      icon: docs
    - url: https://oncall.bank.com/your-service
      title: On-Call Schedule
      icon: group

spec:
  # lifecycle: maturity stage — production, experimental, deprecated
  lifecycle: production

  # system: list of systems this component belongs to
  # Format: system:account/<system-identifier>
  system:
    - system:account/your_platform_name

  # providesApis: APIs this service exposes (must match existing API entity identifiers)
  providesApis:
    - your_service_rest_api
    - your_service_mq_producer

  # consumesApis: APIs this service consumes from other services
  consumesApis:
    - auth_api
    - another_service_api
    - your_service_mq_consumer

  # dependsOn: infrastructure resources this service depends on
  # Format: resource:account/<resource-identifier>
  dependsOn:
    - resource:account/your_service_postgres
    - resource:account/your_service_redis
    - resource:account/shared_kafka

---

# =============================================================================
# RESOURCE — Database
# Represents a persistent data store (PostgreSQL, Oracle, MongoDB, etc.)
# Managed centrally — not per-repo.
# =============================================================================
apiVersion: harness.io/v1
kind: Resource

# identifier must match exactly what is referenced in Component.spec.dependsOn
identifier: your_service_postgres
name: your-service-postgres
type: database
owner: group:account/your-team-name

metadata:
  title: Your Service PostgreSQL DB
  description: >
    Primary transactional database for your-service.
    PostgreSQL 14 on AWS RDS. Multi-AZ, automated backups.
  annotations:
    bank.com/sysid: SYSID-XXXXX
  tags:
    - postgresql
    - rds
    - database
    - sysid-xxxxx

spec:
  # type common values: database, cache, messaging-queue, ftp-server, s3-bucket, secret-store
  system:
    - system:account/your_platform_name

---

# =============================================================================
# RESOURCE — Cache
# Represents an in-memory cache layer (Redis, Memcached, etc.)
# =============================================================================
apiVersion: harness.io/v1
kind: Resource

identifier: your_service_redis
name: your-service-redis
type: cache
owner: group:account/your-team-name

metadata:
  title: Your Service Redis Cache
  description: >
    Session cache and idempotency key store for your-service.
    Redis 7 on AWS ElastiCache. In-transit encryption enabled.
  annotations:
    bank.com/sysid: SYSID-XXXXX
  tags:
    - redis
    - cache
    - elasticache
    - sysid-xxxxx

spec:
  system:
    - system:account/your_platform_name

---

# =============================================================================
# RESOURCE — Messaging Queue / Event Stream
# Represents a Kafka cluster, SQS queue, or similar async messaging system.
# Typically shared across multiple services — managed centrally.
# =============================================================================
apiVersion: harness.io/v1
kind: Resource

identifier: shared_kafka
name: shared-kafka
type: messaging-queue
owner: group:account/platform-team

metadata:
  title: Shared Kafka Cluster
  description: >
    Shared Kafka cluster for asynchronous event streaming across platform services.
    SASL/SCRAM-SHA-256 auth, TLS in transit. Managed by the platform team.
  annotations:
    bank.com/sysid: SYSID-XXXXX
  tags:
    - kafka
    - messaging
    - events
    - sysid-xxxxx

spec:
  system:
    - system:account/your_platform_name

---

# =============================================================================
# API — REST
# Represents a synchronous REST API exposed by a service.
# type: openapi — include an inline OpenAPI 3.0 definition under spec.definition
# =============================================================================
apiVersion: harness.io/v1
kind: API

identifier: your_service_rest_api
name: your-service-rest-api
type: openapi
owner: group:account/your-team-name

metadata:
  title: Your Service REST API
  description: >
    REST API for initiating and querying operations.
    Protected by OAuth2. Rate limited to 1000 req/min per client.
  annotations:
    bank.com/sysid: SYSID-XXXXX
    github.com/project-slug: bank-org/your-service-name
  tags:
    - rest
    - openapi
    - sysid-xxxxx
  links:
    - url: https://api-docs.bank.com/your-service
      title: API Docs
      icon: docs

spec:
  lifecycle: production
  system:
    - system:account/your_platform_name
  definition: |
    openapi: "3.0.0"
    info:
      title: Your Service API
      version: "1.0.0"
    paths:
      /v1/resource:
        post:
          operationId: createResource
          summary: Create a resource
      /v1/resource/{id}:
        get:
          operationId: getResource
          summary: Get a resource by ID

---

# =============================================================================
# API — Messaging Queue Producer (AsyncAPI)
# Represents messages published by this service to a Kafka topic or queue.
# type: asyncapi — include an inline AsyncAPI 2.x definition under spec.definition
# Listed under Component.spec.providesApis
# =============================================================================
apiVersion: harness.io/v1
kind: API

identifier: your_service_mq_producer
name: your-service-mq-producer
type: asyncapi
owner: group:account/your-team-name

metadata:
  title: Your Service MQ Producer
  description: >
    Async event stream produced by your-service. Publishes lifecycle events
    to Kafka topics for downstream services to consume.
  annotations:
    bank.com/sysid: SYSID-XXXXX
    github.com/project-slug: bank-org/your-service-name
  tags:
    - kafka
    - asyncapi
    - events
    - producer
    - sysid-xxxxx

spec:
  lifecycle: production
  system:
    - system:account/your_platform_name
  definition: |
    asyncapi: "2.6.0"
    info:
      title: Your Service MQ Producer
      version: "1.0.0"
    channels:
      your-service.events:
        publish:
          operationId: publishEvent
          summary: Publish a lifecycle event
          message:
            payload:
              type: object
              properties:
                eventId:
                  type: string
                eventType:
                  type: string
                timestamp:
                  type: string

---

# =============================================================================
# API — Messaging Queue Consumer (AsyncAPI)
# Represents messages consumed by this service from a Kafka topic or queue.
# type: asyncapi — include an inline AsyncAPI 2.x definition under spec.definition
# Listed under Component.spec.consumesApis
# =============================================================================
apiVersion: harness.io/v1
kind: API

identifier: your_service_mq_consumer
name: your-service-mq-consumer
type: asyncapi
owner: group:account/your-team-name

metadata:
  title: Your Service MQ Consumer
  description: >
    Async event stream consumed by your-service. Subscribes to upstream
    decision and confirmation events to drive downstream processing.
  annotations:
    bank.com/sysid: SYSID-XXXXX
    github.com/project-slug: bank-org/your-service-name
  tags:
    - kafka
    - asyncapi
    - events
    - consumer
    - sysid-xxxxx

spec:
  lifecycle: production
  system:
    - system:account/your_platform_name
  definition: |
    asyncapi: "2.6.0"
    info:
      title: Your Service MQ Consumer
      version: "1.0.0"
    channels:
      upstream-service.decisions:
        subscribe:
          operationId: consumeDecision
          summary: Consume a decision event from upstream service
          message:
            payload:
              type: object
              properties:
                decisionId:
                  type: string
                outcome:
                  type: string
                timestamp:
                  type: string
