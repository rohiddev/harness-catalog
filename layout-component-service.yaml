page:
  name: EntityLayout
  tabs:

    # ── Overview ───────────────────────────────────────────────────────────────
    - name: Overview
      path: /
      title: Overview
      contents:
        - component: EntityOrphanWarning
        - component: EntityRelationWarning
        - component: EntityProcessingErrorsPanel

        - component: EntityAboutCard
          specs:
            props:
              variant: gridItem
            gridProps:
              md: 6

        - component: EntityScoreCard
          specs:
            gridProps:
              md: 6

        - component: EntityCatalogGraphCard
          specs:
            props:
              variant: gridItem
              height: 400
            gridProps:
              md: 6
              xs: 12

        - component: EntityLinksCard
          specs:
            props:
              variant: gridItem
              height: 400
            gridProps:
              md: 6

    # ── CI/CD ──────────────────────────────────────────────────────────────────
    - name: CI/CD
      path: /ci-cd
      title: CI/CD
      contents:
        - component: EntitySwitch
          specs:
            cases:
              - if: isHarnessCICdAvailable
                content:
                  - component: EntityHarnessCiCdContent
              - content:
                  - component: EmptyState
                    specs:
                      props:
                        title: No CI/CD available for this entity
                        missing: info
                        description: Add the harness.io/project-url annotation to enable CI/CD.

    # ── Scorecard ──────────────────────────────────────────────────────────────
    - name: Scorecard
      path: /scorecard
      title: Scorecard
      contents:
        - component: EntityScorecardContent
          specs:
            gridProps:
              md: 12

    # ── API ────────────────────────────────────────────────────────────────────
    - name: API
      path: /api
      title: API
      contents:
        - component: EntityProvidedApisCard
          specs:
            gridProps:
              md: 12

        - component: EntityConsumedApisCard
          specs:
            gridProps:
              md: 12

    # ── Dependencies ───────────────────────────────────────────────────────────
    - name: Dependencies
      path: /dependencies
      title: Dependencies
      contents:
        - component: EntityDependsOnComponentsCard
          specs:
            props:
              variant: gridItem
            gridProps:
              md: 12

        - component: EntityDependsOnResourcesCard
          specs:
            props:
              variant: gridItem
            gridProps:
              md: 12

    # ── Docs ───────────────────────────────────────────────────────────────────
    - name: TechDocs
      path: /docs
      title: Docs
      contents:
        - component: EntityTechdocsContent
