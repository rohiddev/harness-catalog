page:
  name: EntityLayout
  tabs:

    - name: Overview
      path: /
      title: Overview
      contents:
        - component: EntityOrphanWarning
        - component: EntityRelationWarning
        - component: EntityProcessingErrorsPanel

        - component: EntityAboutCard
          specs:
            props:
              variant: gridItem
            gridProps:
              md: 6

        - component: EntityLinksCard
          specs:
            props:
              variant: gridItem
              height: 400
            gridProps:
              md: 6

        - component: EntityCatalogGraphCard
          specs:
            props:
              variant: gridItem
              height: 400
            gridProps:
              md: 12
              xs: 12

        - component: EntitySonarQubeCard
          specs:
            props:
              variant: gridItem
            gridProps:
              md: 12

    - name: CI/CD
      path: /ci-cd
      title: CI/CD
      contents:
        - component: EntityHarnessCiCdContent

    # Datadog tab — uncomment when Datadog plugin is installed
    # - name: Datadog
    #   path: /datadog
    #   title: Datadog
    #   contents:
    #     - component: EntityDatadogContent
    #       specs:
    #         gridProps:
    #           md: 12

    - name: Scorecard
      path: /scorecard
      title: Scorecard
      contents:
        - component: EntityScorecardContent
          specs:
            gridProps:
              md: 12

    - name: API
      path: /api
      title: API
      contents:
        - component: EntityProvidedApisCard
          specs:
            gridProps:
              md: 12

        - component: EntityConsumedApisCard
          specs:
            gridProps:
              md: 12

    - name: Dependencies
      path: /dependencies
      title: Dependencies
      contents:
        - component: EntityDependsOnComponentsCard
          specs:
            props:
              variant: gridItem
            gridProps:
              md: 6

        - component: EntityDependsOnResourcesCard
          specs:
            props:
              variant: gridItem
            gridProps:
              md: 6

    - name: TechDocs
      path: /docs
      title: Docs
      contents:
        - component: EntityTechdocsContent
